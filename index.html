<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geometric Abstraction Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar">
    <h1>Geometric Abstraction Generator</h1>

    <div class="control-group">
      <h2>Artist Style</h2>
      <select id="styleSelect" onchange="updateParam('style', this.value); regenerate()">
        <option value="mondrian">Piet Mondrian (De Stijl)</option>
        <option value="vandoesburg">Theo van Doesburg (Elementarism)</option>
        <option value="vanderleck">Bart van der Leck (De Stijl)</option>
        <option value="malevich">Kasimir Malevich (Suprematism)</option>
        <option value="lissitzky">El Lissitzky (Constructivism)</option>
        <option value="albers">Josef Albers (Homage to the Square)</option>
        <option value="kelly">Ellsworth Kelly (Hard-edge)</option>
        <option value="lewitt">Sol LeWitt (Wall Drawings)</option>
        <option value="stella">Frank Stella (Minimalism)</option>
        <option value="huszar">Vilmos Husz\u00e1r (De Stijl)</option>
      </select>
    </div>

    <div class="meta-actions">
      <button onclick="showArtistInfo()">\u2139 Info</button>
      <button onclick="showReferences()">View References</button>
    </div>

    <div class="control-group">
      <h2>Seed</h2>
      <div class="seed-nav">
        <button onclick="changeSeed(-1)">Prev</button>
        <button onclick="changeSeed(1)">Next</button>
        <button onclick="randomSeedValue()">Random</button>
      </div>
      <div class="control-row">
        <label for="seedInput">Jump</label>
        <input type="number" id="seedInput" value="42" onchange="setSeed(+this.value)">
      </div>
    </div>

    <div id="params-section">
      <div class="control-group">
        <h2>Resolution</h2>
        <select id="canvasSize" onchange="updateParam('canvasSize', +this.value); resizeAndRegenerate()">
          <option value="600">600 px</option>
          <option value="800" selected>800 px</option>
          <option value="1080">1080 px</option>
          <option value="1440">1440 px</option>
          <option value="1920">1920 px</option>
        </select>
      </div>

      <div class="control-group">
        <h2>Line Weight</h2>
        <div class="control-row">
          <input type="range" id="lineWeight" min="2" max="20" step="1" value="8"
            oninput="updateParam('lineWeight', +this.value); showVal(this, 'lineWeightVal'); regenerate()">
          <span class="value-label" id="lineWeightVal">8</span>
        </div>
      </div>

      <div class="control-group">
        <h2>Min Cell Size</h2>
        <div class="control-row">
          <input type="range" id="minCellSize" min="30" max="200" step="10" value="80"
            oninput="updateParam('minCellSize', +this.value); showVal(this, 'minCellSizeVal'); regenerate()">
          <span class="value-label" id="minCellSizeVal">80</span>
        </div>
      </div>

      <div class="control-group">
        <h2>Split Chance</h2>
        <div class="control-row">
          <input type="range" id="splitChance" min="0.1" max="0.9" step="0.05" value="0.65"
            oninput="updateParam('splitChance', +this.value); showVal(this, 'splitChanceVal'); regenerate()">
          <span class="value-label" id="splitChanceVal">0.65</span>
        </div>
      </div>

      <div class="control-group">
        <h2>Color Probability</h2>
        <div class="control-row">
          <input type="range" id="colorProbability" min="0" max="1" step="0.05" value="0.35"
            oninput="updateParam('colorProbability', +this.value); showVal(this, 'colorProbabilityVal'); regenerate()">
          <span class="value-label" id="colorProbabilityVal">0.35</span>
        </div>
      </div>

      <div class="control-group">
        <h2>Colors</h2>
        <div class="control-row">
          <label for="red">Red</label>
          <input type="color" id="red" value="#E60012" onchange="updateParam('red', this.value); regenerate()">
        </div>
        <div class="control-row">
          <label for="blue">Blue</label>
          <input type="color" id="blue" value="#0055BF" onchange="updateParam('blue', this.value); regenerate()">
        </div>
        <div class="control-row">
          <label for="yellow">Yellow</label>
          <input type="color" id="yellow" value="#F6B800" onchange="updateParam('yellow', this.value); regenerate()">
        </div>
        <div class="control-row">
          <label for="lineColor">Line</label>
          <input type="color" id="lineColor" value="#111111" onchange="updateParam('lineColor', this.value); regenerate()">
        </div>
        <div class="control-row">
          <label for="bgColor">Background</label>
          <input type="color" id="bgColor" value="#F4F4F4" onchange="updateParam('bgColor', this.value); regenerate()">
        </div>
        <div class="control-row">
          <label for="grayColor">Gray</label>
          <input type="color" id="grayColor" value="#D0D0D0" onchange="updateParam('grayColor', this.value); regenerate()">
        </div>
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="useGray">Use Gray Cells</label>
          <input type="checkbox" id="useGray" onchange="updateParam('useGray', this.checked); regenerate()">
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="regenerate()">Regenerate</button>
      <button onclick="resetDefaults()">Reset Defaults</button>
      <button onclick="downloadPNG()">Download PNG</button>
    </div>
  </div>

  <div id="canvas-container"></div>

  <!-- Artist Info Modal -->
  <div class="modal-overlay" id="artistModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="artistModalTitle">Artist Info</h3>
        <button onclick="closeModal('artistModal')">&times;</button>
      </div>
      <div class="modal-body" id="artistModalBody"></div>
    </div>
  </div>

  <!-- References Modal -->
  <div class="modal-overlay" id="refsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>References</h3>
        <button onclick="closeModal('refsModal')">&times;</button>
      </div>
      <div class="modal-body" id="refsModalBody"></div>
    </div>
  </div>

  <!-- REFERENCES.md embedded for viewer -->
  <script type="text/plain" id="references-source">
# References \u2014 Geometric Abstraction Artists

## Piet Mondrian (1872\u20131944)
**Movement:** Neoplasticism (De Stijl)
Black orthogonal lines forming irregular grids. Strict primaries (red, blue, yellow) plus non-colors (white, gray, black). No diagonals, no curves. The canvas is fully divided into rectangles of unequal proportion.

**Key Works:** Composition with Red, Blue, and Yellow (1930), Broadway Boogie Woogie (1943)

---

## Theo van Doesburg (1883\u20131931)
**Movement:** De Stijl, Elementarism
Horizontal, vertical, AND diagonal lines. Parallelograms and trapezoids created by intersecting diagonals. More dynamic than Mondrian \u2014 compositions feel like they are in motion. The diagonal acts as a visual accelerator.

**Key Works:** Counter-Composition V (1924), Simultaneous Counter-Composition (1929\u201330)

---

## Bart van der Leck (1876\u20131958)
**Movement:** De Stijl
Thick black outlines around flat color planes. Simplified, pictographic shapes. Less grid-locked than Mondrian \u2014 shapes float across generous white space. Like stained glass without the leading.

**Key Works:** The Tempest (1916), Composition 1917 (1917)

---

## Kasimir Malevich (1878\u20131935)
**Movement:** Suprematism
Minimal lines. Forms are self-contained and float without enclosing grids. Squares, circles, crosses, rectangles. White background dominant. Black and sparse primaries. Forms float in undefined white space like objects in zero gravity.

**Key Works:** Black Square (1915), Suprematist Composition: Airplane Flying (1915)

---

## El Lissitzky (1890\u20131941)
**Movement:** Suprematism, Constructivism
Thin, precise lines suggesting architectural plans. Overlapping rectangles, circles, and wedges. Forms appear to slide past each other in shallow depth. Axonometric perspective creates spatial ambiguity.

**Key Works:** Proun 99 (1923\u201325), Beat the Whites with the Red Wedge (1919)

---

## Josef Albers (1888\u20131976)
**Movement:** Bauhaus, Hard-edge painting
No visible lines. Perfectly nested squares, always concentric, always with the same proportional spacing. The entire subject is color interaction. The only variable is color.

**Key Works:** Homage to the Square: With Orchids (1962), Homage to the Square: Apparition (1959)

---

## Ellsworth Kelly (1923\u20132015)
**Movement:** Hard-edge painting, Color Field
Radical simplification: a single shape on a canvas, or a canvas shaped to match its form. The edge of the shape itself is the only line. One color per shape. The interaction is between shape and ground.

**Key Works:** Colors for a Large Wall (1951), Red Blue Green (1963)

---

## Sol LeWitt (1928\u20132007)
**Movement:** Conceptual art, Minimalism
Grids with multiple line directions superimposed. Straight, diagonal, curved, or broken lines. Forms created by the intersection of lines. The visual result is the logical outcome of a rule.

**Key Works:** Wall Drawing #11 (1969), Wall Drawing #122 (1972)

---

## Frank Stella (1936\u2013)
**Movement:** Minimalism, Post-painterly abstraction
Parallel stripes, concentric bands, or grid-based geometric paths. Systematic patterns generated by rules. Early work is black only; middle introduces Day-Glo colors and shaped canvases.

**Key Works:** The Marriage of Reason and Squalor, II (1959), Harran II (1967)

---

## Vilmos Husz\u00e1r (1884\u20131960)
**Movement:** De Stijl
Orthogonal black lines, identical to Mondrian. Rectangular cells with one dominant large block and several smaller satellites. Tends toward calmer, more meditative balance. Gray appears more frequently than in Mondrian.

**Key Works:** Composition with Yellow, Blue and Red (1920), Mechano-Dancer (1922)

</body>
</html>
