# References — Geometric Abstraction Artists

This document catalogs the artists whose visual languages inspired the generative compositions in this project.

---

## 1. Piet Mondrian (1872–1944)

**Nationality:** Dutch  
**Movement:** Neoplasticism (De Stijl)  
**Peak period:** 1920–1944

Piet Cornelis Mondriaan (later Mondrian) began as a naturalistic landscape painter. In 1917 he co-founded *De Stijl* magazine with Theo van Doesburg. His mature style — black orthogonal lines forming irregular grids, filled with red, blue, yellow, white, and occasionally gray — became his life's work. He fled WWII Europe for New York, where his late works introduced fragmented color segments inspired by jazz.

**Visual Style**
- Lines: Only horizontal and vertical. Black, usually uniform within a single work.
- Forms: Rectangles of unequal proportion. The grid is asymmetric but balanced.
- Colors: Strict primaries plus non-colors (white, black, gray). No mixing, no gradients.
- Composition: Edge-to-edge lines. Some rectangles are left white; a minority receive color.
- Space: Entirely flat. No perspective, no depth cues.

**Key Works**
- Composition with Red, Blue, and Yellow (1930)
- Composition A (1923)
- Broadway Boogie Woogie (1943)
- Victory Boogie Woogie (1944, unfinished)

---

## 2. Theo van Doesburg (1883–1931)

**Nationality:** Dutch  
**Movement:** De Stijl, Elementarism  
**Peak period:** 1917–1931

Theo van Doesburg founded *De Stijl* magazine and acted as its international ambassador. The decisive break with Mondrian came in 1924 when van Doesburg introduced the diagonal into his compositions. Mondrian viewed this as a betrayal of neoplasticist principles and left De Stijl. Van Doesburg rechristened his new approach "Elementarism," arguing that the diagonal introduced dynamism.

**Visual Style**
- Lines: Horizontal, vertical, and diagonal. The diagonal is the hallmark.
- Forms: Parallelograms and trapezoids created by intersecting diagonals.
- Colors: Same primaries + non-colors as Mondrian, but arranged to create directional tension.
- Composition: More dynamic than Mondrian. Compositions feel like they are in motion.
- Space: Flat, but the diagonal introduces a suggestion of depth.

**Key Works**
- Counter-Composition V (1924)
- Counter-Composition XIII (1925–26)
- Simultaneous Counter-Composition (1929–30)
- Stained-glass composition XXIII (1924)

---

## 3. Bart van der Leck (1876–1958)

**Nationality:** Dutch  
**Movement:** De Stijl  
**Peak period:** 1916–1920

Bart van der Leck was the oldest member of the De Stijl circle and its precursor. His 1916 painting *The Tempest* shows a rider on a horse decomposed into colored rectangles and black outlines — directly influencing Mondrian's move toward pure abstraction. After 1920 he largely withdrew and developed a more personal style with isolated colored forms on white grounds.

**Visual Style**
- Lines: Thick black outlines around flat color planes.
- Forms: Simplified, almost pictographic shapes derived from recognizable subjects.
- Colors: Primaries, but with a tendency toward larger white spaces and isolated color patches.
- Composition: Less grid-locked than Mondrian. Shapes float across generous white space.

**Key Works**
- The Tempest (1916)
- Composition 1917 (1917)
- Woman with Goats (c. 1920)

---

## 4. Kasimir Malevich (1878–1935)

**Nationality:** Russian  
**Movement:** Suprematism  
**Peak period:** 1915–1935

Kazimir Malevich passed through Impressionism, Symbolism, and Cubo-Futurism before arriving at Suprematism in 1915 with the exhibition *0,10*, where he hung *Black Square* in the corner of the room. Suprematism claimed to depict "the supremacy of pure artistic feeling" over representation of objects. He taught at Vitebsk (where he influenced El Lissitzky).

**Visual Style**
- Lines: Minimal. Forms are self-contained and float without enclosing grids.
- Forms: Squares, circles, crosses, rectangles, and lines. Simple, iconic shapes.
- Colors: White background is dominant. Black, red, and occasionally blue or yellow forms.
- Composition: Forms float in an undefined white space, like objects in zero gravity.
- Space: Infinite white void. The canvas is a window into boundless space.

**Key Works**
- Black Square (1915)
- Suprematist Composition: Airplane Flying (1915)
- Suprematist Composition (1916)
- White on White (1918)

---

## 5. El Lissitzky (1890–1941)

**Nationality:** Russian  
**Movement:** Suprematism, Constructivism  
**Peak period:** 1919–1929

Lazar Markovich Lissitzky was deeply influenced by Malevich's Suprematism but sought to extend it into three dimensions and practical design. His *Proun* series are abstract compositions that occupy an ambiguous space between painting and architecture — axonometric projections of impossible structures. His famous *Beat the Whites with the Red Wedge* (1919) translates Suprematist geometry into political narrative.

**Visual Style**
- Lines: Thin, precise lines suggesting architectural plans and axonometric projection.
- Forms: Overlapping rectangles, circles, and wedges. Forms appear to slide past each other.
- Colors: Limited palette — red, black, white, gray. Color is used structurally.
- Composition: Asymmetrical, dynamic, with forms seeming to enter and exit the frame.
- Space: Shallow but present. Forms overlap and cast no shadows, yet suggest layers.

**Key Works**
- Proun 99 (1923–25)
- Proun 30T (1920)
- Beat the Whites with the Red Wedge (1919)
- The Constructor (self-portrait photomontage, 1924)

---

## 6. Josef Albers (1888–1976)

**Nationality:** German-American  
**Movement:** Bauhaus, Hard-edge painting  
**Peak period:** 1950–1976

Josef Albers is best known for his *Homage to the Square* series — over 1,000 paintings, all variations on the same nested-square format. Albers was not interested in composition in the traditional sense; he was interested in color interaction. His book *Interaction of Color* (1963) is still a standard text in art education.

**Visual Style**
- Lines: No visible lines. Edges between color fields are sharp but not drawn.
- Forms: Perfectly nested squares, always concentric, always with the same proportional spacing.
- Colors: The entire subject. Albers used oil paint but treated color as data.
- Composition: Rigidly fixed format. The only variable is color.

**Key Works**
- Homage to the Square: With Orchids (1962)
- Homage to the Square: Apparition (1959)
- Homage to the Square: Temperate (1957)
- Variant/Adobe series (1947–55)

---

## 7. Ellsworth Kelly (1923–2015)

**Nationality:** American  
**Movement:** Hard-edge painting, Color Field  
**Peak period:** 1950–2015

Ellsworth Kelly lived in Paris from 1948 to 1954, where he encountered Mondrian, Arp, and Brancusi. His innovation was radical simplification: a single shape on a canvas, or a canvas shaped to match the form it contains. His *Colors for a Large Wall* (1951) consists of 64 monochromatic panels arranged in a grid — a direct descendant of Mondrian but with each cell isolated.

**Visual Style**
- Lines: The edge of the shape itself. No interior lines, no grids.
- Forms: A single dominant shape — rectangle, circle, irregular curve, or multi-panel arrangement.
- Colors: Flat, unmodulated color. One color per shape.
- Composition: Extreme reduction. The entire canvas is activated by the tension between one form and its background.

**Key Works**
- Colors for a Large Wall (1951)
- Red Blue Green (1963)
- Spectrum Colors Arranged by Chance (1951–52)
- Curve XXII (1982)

---

## 8. Sol LeWitt (1928–2007)

**Nationality:** American  
**Movement:** Conceptual art, Minimalism  
**Peak period:** 1968–2007

Sol LeWitt is best known for his *Wall Drawings* — instructions written by LeWitt and executed by teams of draftsmen on gallery walls. The instructions are the artwork; the physical manifestation is temporary and replaceable. LeWitt's vocabulary is entirely geometric: lines, grids, cubes, and color bands. His structures are modular and combinatorial.

**Visual Style**
- Lines: Straight, diagonal, curved, or broken. Often in multiple directions superimposed.
- Forms: Grids, cubes, color bands. Forms are created by the intersection of lines.
- Colors: Early work is monochrome. Later Wall Drawings use flat color washes.
- Composition: Determined by a written instruction. The visual result is the logical outcome of a rule.

**Key Works**
- Wall Drawing #11 (1969)
- Wall Drawing #122 (1972)
- Serial Project, I (ABCD) (1966)

---

    let cells = [];

    function updateParam(key, value) {
      PARAMS[key] = value;
    }

    function showVal(el, labelId) {
      document.getElementById(labelId).textContent = el.value;
    }

    function changeSeed(delta) {
      PARAMS.seed += delta;
      document.getElementById('seedInput').value = PARAMS.seed;
      regenerate();
    }

    function randomSeedValue() {
      PARAMS.seed = Math.floor(Math.random() * 1000000);
      document.getElementById('seedInput').value = PARAMS.seed;
      regenerate();
    }

    function setSeed(val) {
      PARAMS.seed = val;
      document.getElementById('seedInput').value = val;
      regenerate();
    }

    function resizeAndRegenerate() {
      resizeCanvas(PARAMS.canvasSize, PARAMS.canvasSize);
      regenerate();
    }

    function regenerate() {
      randomSeed(PARAMS.seed);
      noiseSeed(PARAMS.seed);
      generate();
      redraw();
    }

    function resetDefaults() {
      PARAMS = { ...DEFAULTS };
      document.getElementById('styleSelect').value = PARAMS.style;
      document.getElementById('seedInput').value = PARAMS.seed;
      document.getElementById('canvasSize').value = PARAMS.canvasSize;
      document.getElementById('lineWeight').value = PARAMS.lineWeight;
      document.getElementById('lineWeightVal').textContent = PARAMS.lineWeight;
      document.getElementById('minCellSize').value = PARAMS.minCellSize;
      document.getElementById('minCellSizeVal').textContent = PARAMS.minCellSize;
      document.getElementById('splitChance').value = PARAMS.splitChance;
      document.getElementById('splitChanceVal').textContent = PARAMS.splitChance;
      document.getElementById('colorProbability').value = PARAMS.colorProbability;
      document.getElementById('colorProbabilityVal').textContent = PARAMS.colorProbability;
      document.getElementById('red').value = PARAMS.red;
      document.getElementById('blue').value = PARAMS.blue;
      document.getElementById('yellow').value = PARAMS.yellow;
      document.getElementById('lineColor').value = PARAMS.lineColor;
      document.getElementById('bgColor').value = PARAMS.bgColor;
      document.getElementById('grayColor').value = PARAMS.grayColor;
      document.getElementById('useGray').checked = PARAMS.useGray;
      resizeAndRegenerate();
    }

    function downloadPNG() {
      saveCanvas(PARAMS.style + '-seed-' + PARAMS.seed, 'png');
    }

    // === MODALS ===
    function showArtistInfo() {
      const data = ARTIST_DATA[PARAMS.style] || ARTIST_DATA.mondrian;
      document.getElementById('artistModalTitle').textContent = data.name;
      document.getElementById('artistModalBody').innerHTML = `
        <h4>Years</h4>
        <p>${data.years}</p>
        <h4>Movement</h4>
        <p>${data.movement}</p>
        <h4>Description</h4>
        <p>${data.description}</p>
        <h4>Key Works</h4>
        <div class="artist-keyworks">
          ${data.keyWorks.map(w => `<span>${w}</span>`).join('')}
        </div>
      `;
      document.getElementById('artistModal').classList.add('active');
    }

    function showReferences() {
      const raw = document.getElementById('references-source').textContent;
      document.getElementById('refsModalBody').innerHTML = renderMarkdownBasic(raw);
      document.getElementById('refsModal').classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('active');
      });
    });

    function renderMarkdownBasic(md) {
      return md
        .replace(/^# (.*$)/gim, '<h4>$1</h4>')
        .replace(/^## (.*$)/gim, '<h4>$1</h4>')
        .replace(/^### (.*$)/gim, '<h4>$1</h4>')
        .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/gim, '<em>$1</em>')
        .replace(/^- (.*$)/gim, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/---/g, '<hr>')
        .replace(/\n/g, '<br>');
    }

    // === COLOR HELPERS ===
    function ensureMinimumColor() {
      let colored = cells.filter(c => c.color !== null);
      let minColored = Math.max(3, Math.floor(cells.length * 0.12));
      if (colored.length < minColored) {
        let empty = cells.filter(c => c.color === null);
        empty.sort(() => random() - 0.5);
        let needed = minColored - colored.length;
        for (let i = 0; i < Math.min(needed, empty.length); i++) {
          empty[i].color = pickColorForced();
        }
      }
      if (colored.length >= 2) {
        let uniqueColors = new Set(colored.map(c => c.color));
        if (uniqueColors.size < 2) {
          let empty = cells.filter(c => c.color === null);
          if (empty.length > 0) {
            let palette = [PARAMS.red, PARAMS.blue, PARAMS.yellow].filter(c => c !== colored[0].color);
            empty[0].color = random(palette);
          }
        }
      }
    }

    function ensureMinimumColorCount(arr, min) {
      let colored = arr.filter(c => c.color !== null);
      if (colored.length < min) {
        let empty = arr.filter(c => c.color === null);
        empty.sort(() => random() - 0.5);
        let needed = min - colored.length;
        for (let i = 0; i < Math.min(needed, empty.length); i++) {
          empty[i].color = pickColorForced();
        }
      }
    }

    function pickColorForced() {
      let palette = [PARAMS.red, PARAMS.blue, PARAMS.yellow];
      if (PARAMS.useGray) palette.push(PARAMS.grayColor);
      return random(palette);
    }

    function pickColor() {
      if (random() > PARAMS.colorProbability) return null;
      return pickColorForced();
    }

    function pickColorProb(p) {
      if (random() > p) return null;
      return pickColorForced();
    }

    // === SUBDIVISION ===
    function subdivide(x, y, w, h) {
      if (w < PARAMS.minCellSize * 2 && h < PARAMS.minCellSize * 2) {
        cells.push({ x, y, w, h, color: pickColor() });
        return;
      }
      if (w < PARAMS.minCellSize || h < PARAMS.minCellSize || random() > PARAMS.splitChance) {
        cells.push({ x, y, w, h, color: pickColor() });
        return;
      }

      let ratio = w / h;
      let splitVert;
      if (ratio > 1.8) splitVert = true;
      else if (ratio < 0.55) splitVert = false;
      else splitVert = random() > 0.5;

      if (splitVert && w > PARAMS.minCellSize) {
        let splitAt = random(PARAMS.minCellSize, w - PARAMS.minCellSize);
        let thirds = [w * 0.33, w * 0.5, w * 0.67];
        let closest = thirds.reduce((a, b) => Math.abs(b - splitAt) < Math.abs(a - splitAt) ? b : a);
        if (abs(splitAt - closest) < w * 0.1) splitAt = closest;

        subdivide(x, y, splitAt, h);
        subdivide(x + splitAt, y, w - splitAt, h);
      } else if (!splitVert && h > PARAMS.minCellSize) {
        let splitAt = random(PARAMS.minCellSize, h - PARAMS.minCellSize);
        let thirds = [h * 0.33, h * 0.5, h * 0.67];
        let closest = thirds.reduce((a, b) => Math.abs(b - splitAt) < Math.abs(a - splitAt) ? b : a);
        if (abs(splitAt - closest) < h * 0.1) splitAt = closest;

        subdivide(x, y, w, splitAt);
        subdivide(x, y + splitAt, w, h - splitAt);
      } else {
        cells.push({ x, y, w, h, color: pickColor() });
      }
    }

    // === STYLE ROUTER ===
    function generate() {
      switch (PARAMS.style) {
        case 'vandoesburg': generateVanDoesburg(); break;
        case 'vanderleck': generateVanDerLeck(); break;
        case 'malevich': generateMalevich(); break;
        case 'lissitzky': generateLissitzky(); break;
        case 'albers': generateAlbers(); break;
        case 'kelly': generateKelly(); break;
        case 'lewitt': generateLeWitt(); break;
        case 'stella': generateStella(); break;
        case 'huszar': generateHuszar(); break;
        default: generateMondrian(); break;
      }
    }

    // === MONDRIAN ===
    function generateMondrian() {
      cells = [];
      subdivide(0, 0, PARAMS.canvasSize, PARAMS.canvasSize);
      ensureMinimumColor();

      background(PARAMS.bgColor);

      for (let c of cells) {
        if (c.color) {
          fill(c.color);
          noStroke();
          let inset = PARAMS.lineWeight / 2;
          rect(c.x + inset, c.y + inset, c.w - inset * 2, c.h - inset * 2);
        }
      }

      stroke(PARAMS.lineColor);
      strokeWeight(PARAMS.lineWeight);

      for (let c of cells) {
        noFill();
        rect(c.x, c.y, c.w, c.h);
      }
    }

    // === VAN DOESBURG ===
    function generateVanDoesburg() {
      cells = [];
      subdivide(0, 0, PARAMS.canvasSize, PARAMS.canvasSize);
      ensureMinimumColor();

      background(PARAMS.bgColor);

      // Fill cells
      for (let c of cells) {
        if (c.color) {
          fill(c.color);
          noStroke();
          let inset = PARAMS.lineWeight / 2;
          rect(c.x + inset, c.y + inset, c.w - inset * 2, c.h - inset * 2);
        }
      }

      // Draw grid lines
      stroke(PARAMS.lineColor);
      strokeWeight(PARAMS.lineWeight);
      for (let c of cells) {
        noFill();
        rect(c.x, c.y, c.w, c.h);
      }

      // Add diagonal slices through some cells
      let sliceCount = Math.floor(random(2, 5));
      let candidates = cells.filter(c => c.w > PARAMS.minCellSize && c.h > PARAMS.minCellSize);
      candidates.sort(() => random() - 0.5);
      for (let i = 0; i < Math.min(sliceCount, candidates.length); i++) {
        let c = candidates[i];
        let d1 = random() > 0.5;
        stroke(PARAMS.lineColor);
        strokeWeight(PARAMS.lineWeight * 0.8);
        if (d1) {
          line(c.x, c.y, c.x + c.w, c.y + c.h);
        } else {
          line(c.x + c.w, c.y, c.x, c.y + c.h);
        }
        // Optionally color one triangular half
        if (random() > 0.4) {
          let col = pickColorForced();
          fill(col);
          noStroke();
          beginShape();
          if (d1) {
            vertex(c.x, c.y);
            vertex(c.x + c.w, c.y + c.h);
            vertex(c.x, c.y + c.h);
          } else {
            vertex(c.x + c.w, c.y);
            vertex(c.x, c.y + c.h);
            vertex(c.x + c.w, c.y + c.h);
          }
          endShape(CLOSE);
        }
      }
    }

    // === VAN DER LECK ===
    function generateVanDerLeck() {
      cells = [];
      // Fewer splits: higher min cell size and lower split chance for this run
      let savedMin = PARAMS.minCellSize;
      let savedSplit = PARAMS.splitChance;
      PARAMS.minCellSize = Math.max(savedMin, Math.floor(PARAMS.canvasSize * 0.22));
      PARAMS.splitChance = 0.35;
      subdivide(0, 0, PARAMS.canvasSize, PARAMS.canvasSize);
      PARAMS.minCellSize = savedMin;
      PARAMS.splitChance = savedSplit;

      ensureMinimumColorCount(cells, 3);

      background(PARAMS.bgColor);

      let thick = Math.max(PARAMS.lineWeight, Math.floor(PARAMS.canvasSize * 0.018));

      for (let c of cells) {
        if (c.color) {
          fill(c.color);
          noStroke();
          rect(c.x + thick, c.y + thick, c.w - thick * 2, c.h - thick * 2);
        }
      }

      stroke(PARAMS.lineColor);
      strokeWeight(thick);
      for (let c of cells) {
        noFill();
        rect(c.x, c.y, c.w, c.h);
      }
    }

    // === MALEVICH ===
    function generateMalevich() {
      background(PARAMS.bgColor);
      let s = PARAMS.canvasSize;
      let forms = [];
      let count = Math.floor(random(3, 8));
      let palette = [PARAMS.lineColor, PARAMS.lineColor, PARAMS.red, PARAMS.blue, PARAMS.yellow];

      for (let i = 0; i < count; i++) {
        let shapeType = random() > 0.75 ? 'circle' : (random() > 0.85 ? 'line' : 'rect');
        let size = random(s * 0.08, s * 0.35);
        let x = random(s * 0.1, s * 0.9);
        let y = random(s * 0.1, s * 0.9);
        let color = random(palette);
        let rot = random(TWO_PI);
        forms.push({ shapeType, x, y, size, color, rot });
      }

      // Ensure at least one primary color
      let hasPrimary = forms.some(f => f.color === PARAMS.red || f.color === PARAMS.blue || f.color === PARAMS.yellow);
      if (!hasPrimary && forms.length > 0) {
        forms[0].color = random([PARAMS.red, PARAMS.blue, PARAMS.yellow]);
      }

      // Sort so larger forms draw first (background)
      forms.sort((a, b) => b.size - a.size);

      for (let f of forms) {
        noStroke();
        fill(f.color);
        push();
        translate(f.x, f.y);
        rotate(f.rot);
        if (f.shapeType === 'rect') {
          rectMode(CENTER);
          rect(0, 0, f.size, f.size * random(0.5, 1.5));
        } else if (f.shapeType === 'circle') {
          circle(0, 0, f.size);
        } else {
          stroke(f.color);
          strokeWeight(max(2, s * 0.008));
          line(-f.size / 2, 0, f.size / 2, 0);
        }
        pop();
      }

      // Thin motion lines / trails on some forms
      for (let f of forms) {
        if (random() > 0.6) {
          stroke(PARAMS.lineColor);
          strokeWeight(max(1, s * 0.004));
          let tx = f.x + random(-s * 0.15, s * 0.15);
          let ty = f.y + random(-s * 0.15, s * 0.15);
          line(f.x, f.y, tx, ty);
        }
      }
    }

    // === EL LISSITZKY ===
    function generateLissitzky() {
      background(PARAMS.bgColor);
      let s = PARAMS.canvasSize;
      let forms = [];
      let count = Math.floor(random(5, 10));
      let palette = [PARAMS.red, PARAMS.lineColor, PARAMS.grayColor, PARAMS.bgColor];

      for (let i = 0; i < count; i++) {
        let w = random(s * 0.15, s * 0.5);
        let h = random(s * 0.1, s * 0.35);
        let x = random(-s * 0.1, s * 0.7);
        let y = random(-s * 0.1, s * 0.7);
        let shearAmt = random(-0.35, 0.35);
        let color = random(palette);
        forms.push({ x, y, w, h, shearAmt, color });
      }

      // Ensure at least one red + one black
      if (!forms.some(f => f.color === PARAMS.red)) forms[0].color = PARAMS.red;
      if (!forms.some(f => f.color === PARAMS.lineColor)) forms[1].color = PARAMS.lineColor;

      // Draw construction lines
      stroke(PARAMS.grayColor);
      strokeWeight(max(1, s * 0.003));
      for (let i = 0; i < 6; i++) {
        let x = random(s * 0.1, s * 0.9);
        line(x, 0, x + random(-s * 0.1, s * 0.1), s);
      }
      for (let i = 0; i < 6; i++) {
        let y = random(s * 0.1, s * 0.9);
        line(0, y + random(-s * 0.05, s * 0.05), s, y);
      }

      // Draw overlapping sheared rectangles
      for (let f of forms) {
        noStroke();
        fill(f.color);
        push();
        translate(f.x + f.w / 2, f.y + f.h / 2);
        shearX(f.shearAmt);
        rectMode(CENTER);
        rect(0, 0, f.w, f.h);
        pop();
      }

      // One or two circles breaking the rhythm
      if (random() > 0.3) {
        noStroke();
        fill(random([PARAMS.red, PARAMS.yellow, PARAMS.lineColor]));
        let cx = random(s * 0.2, s * 0.8);
        let cy = random(s * 0.2, s * 0.8);
        let cr = random(s * 0.05, s * 0.18);
        circle(cx, cy, cr);
      }
    }

    // === ALBERS ===
    function generateAlbers() {
      background(PARAMS.bgColor);
      let s = PARAMS.canvasSize;
      let margin = s * 0.08;
      let levels = Math.floor(random(3, 5));

      // Build a harmonious or contrasting palette for this composition
      let baseHue = random(360);
      let palettes = [];
      for (let i = 0; i < levels; i++) {
        let h = (baseHue + i * 30 + random(20)) % 360;
        let sat = random(30, 85);
        let bri = random(35, 90);
        colorMode(HSB);
        palettes.push(color(h, sat, bri));
      }
      colorMode(RGB);

      // One random primary override for pop
      if (random() > 0.4) {
        palettes[Math.floor(random(levels))] = color(PARAMS.red);
      }
      if (random() > 0.5) {
        palettes[Math.floor(random(levels))] = color(PARAMS.blue);
      }
      if (random() > 0.5) {
        palettes[Math.floor(random(levels))] = color(PARAMS.yellow);
      }

      let shrink = 0.72 + random(0.06);
      let cx = s / 2;
      let cy = s / 2;
      let size = s - margin * 2;

      noStroke();
      for (let i = 0; i < levels; i++) {
        fill(palettes[i]);
        rectMode(CENTER);
        rect(cx, cy, size, size);
        size *= shrink;
      }
      rectMode(CORNER);
    }

    // === KELLY ===
    function generateKelly() {
      background(PARAMS.bgColor);
      let s = PARAMS.canvasSize;

      if (random() > 0.5) {
        // Single dominant shape
        let shapeType = random() > 0.5 ? 'rect' : 'circle';
        let col = random([PARAMS.red, PARAMS.blue, PARAMS.yellow, PARAMS.lineColor]);
        noStroke();
        fill(col);
        if (shapeType === 'rect') {
          let w = random(s * 0.3, s * 0.7);
          let h = random(s * 0.3, s * 0.7);
          let x = random(s * 0.05, s * 0.95 - w);
          let y = random(s * 0.05, s * 0.95 - h);
          rect(x, y, w, h);
        } else {
          let r = random(s * 0.15, s * 0.35);
          let x = random(s * 0.2, s * 0.8);
          let y = random(s * 0.2, s * 0.8);
          circle(x, y, r);
        }
      } else {
        // Grid of colored panels
        let cols = Math.floor(random(3, 6));
        let rows = Math.floor(random(3, 6));
        let gap = Math.max(2, Math.floor(s * 0.01));
        let cellW = (s - gap * (cols + 1)) / cols;
        let cellH = (s - gap * (rows + 1)) / rows;
        let palette = [PARAMS.red, PARAMS.blue, PARAMS.yellow, PARAMS.lineColor, PARAMS.bgColor, PARAMS.grayColor];
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            let x = gap + c * (cellW + gap);
            let y = gap + r * (cellH + gap);
            noStroke();
            fill(random(palette));
            rect(x, y, cellW, cellH);
          }
        }
      }
    }

    // === LEWITT ===
    function generateLeWitt() {
      background(PARAMS.bgColor);
      let s = PARAMS.canvasSize;
      let cols = Math.floor(random(4, 8));
      let rows = Math.floor(random(4, 8));
      let gap = PARAMS.lineWeight;
      let cellW = (s - gap * (cols + 1)) / cols;
      let cellH = (s - gap * (rows + 1)) / rows;

      // Fill some cells with flat color
      let coloredCells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (random() < PARAMS.colorProbability * 0.6) {
            let x = gap + c * (cellW + gap);
            let y = gap + r * (cellH + gap);
            coloredCells.push({ x, y, w: cellW, h: cellH, color: pickColorForced() });
          }
        }
      }
      // Ensure some color
      if (coloredCells.length < 2) {
        let r = Math.floor(random(rows));
        let c = Math.floor(random(cols));
        let x = gap + c * (cellW + gap);
        let y = gap + r * (cellH + gap);
        coloredCells.push({ x, y, w: cellW, h: cellH, color: pickColorForced() });
      }

      for (let cc of coloredCells) {
        noStroke();
        fill(cc.color);
        rect(cc.x, cc.y, cc.w, cc.h);
      }

      // Draw line patterns in each cell
      let lineTypes = ['vertical', 'horizontal', 'diag1', 'diag2', 'cross'];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          let x = gap + c * (cellW + gap);
          let y = gap + r * (cellH + gap);
          let type = random(lineTypes);
          stroke(PARAMS.lineColor);
          strokeWeight(max(1, PARAMS.lineWeight * 0.4));

          if (type === 'vertical') {
            let n = Math.floor(random(3, 7));
            for (let i = 1; i < n; i++) {
              let lx = x + (cellW / n) * i;
              line(lx, y, lx, y + cellH);
            }
          } else if (type === 'horizontal') {
            let n = Math.floor(random(3, 7));
            for (let i = 1; i < n; i++) {
              let ly = y + (cellH / n) * i;
              line(x, ly, x + cellW, ly);
            }
          } else if (type === 'diag1') {
            line(x, y, x + cellW, y + cellH);
          } else if (type === 'diag2') {
            line(x + cellW, y, x, y + cellH);
          } else if (type === 'cross') {
            line(x, y, x + cellW, y + cellH);
            line(x + cellW, y, x, y + cellH);
          }
        }
      }

      // Outer grid lines
      stroke(PARAMS.lineColor);
      strokeWeight(PARAMS.lineWeight);
      for (let c = 0; c <= cols; c++) {
        let x = c * (cellW + gap) + gap / 2;
        line(x, 0, x, s);
      }
      for (let r = 0; r <= rows; r++) {
        let y = r * (cellH + gap) + gap / 2;
        line(0, y, s, y);
      }
    }

    // === STELLA ===
    function generateStella() {
      background(PARAMS.bgColor);
      let s = PARAMS.canvasSize;
      let mode = random() > 0.5 ? 'parallel' : 'concentric';

      if (mode === 'parallel') {
        // Irregular polygon with parallel interior lines
        let margin = s * 0.1;
        let w = s - margin * 2;
        let h = s * random(0.5, 0.8);
        let x = margin;
        let y = (s - h) / 2;

        // Slightly irregular vertices
        let vertices = [
          { x: x + random(-10, 10), y: y + random(-10, 10) },
          { x: x + w + random(-10, 10), y: y + random(-10, 10) },
          { x: x + w + random(-10, 10), y: y + h + random(-10, 10) },
          { x: x + random(-10, 10), y: y + h + random(-10, 10) }
        ];

        let numStripes = floor(random(5, 12));
        let stripeColors = [PARAMS.lineColor, PARAMS.bgColor];
        if (random() < 0.6) stripeColors.push(PARAMS.red);
        if (random() < 0.6) stripeColors.push(PARAMS.blue);
        if (random() < 0.6) stripeColors.push(PARAMS.yellow);

        for (let i = 0; i < numStripes; i++) {
          let t1 = i / numStripes;
          let t2 = (i + 1) / numStripes;
          fill(stripeColors[i % stripeColors.length]);
          noStroke();
          beginShape();
          vertex(lerp(vertices[0].x, vertices[3].x, t1), lerp(vertices[0].y, vertices[3].y, t1));
          vertex(lerp(vertices[0].x, vertices[3].x, t2), lerp(vertices[0].y, vertices[3].y, t2));
          vertex(lerp(vertices[1].x, vertices[2].x, t2), lerp(vertices[1].y, vertices[2].y, t2));
          vertex(lerp(vertices[1].x, vertices[2].x, t1), lerp(vertices[1].y, vertices[2].y, t1));
          endShape(CLOSE);
        }

        // Outer contour
        stroke(PARAMS.lineColor);
        strokeWeight(PARAMS.lineWeight);
        noFill();
        beginShape();
        for (let v of vertices) vertex(v.x, v.y);
        endShape(CLOSE);
      } else {
        // Concentric irregular shapes
        let numShapes = floor(random(4, 8));
        let margin = s * 0.05;
        let palette = [PARAMS.red, PARAMS.blue, PARAMS.yellow, PARAMS.lineColor, PARAMS.grayColor];

        for (let i = 0; i < numShapes; i++) {
          let ratio = 1 - (i / numShapes) * 0.85;
          let w = (s - margin * 2) * ratio;
          let h = w * random(0.7, 1.0);
          let x = (s - w) / 2 + random(-15, 15);
          let y = (s - h) / 2 + random(-15, 15);

          fill(palette[i % palette.length]);
          noStroke();
          beginShape();
          vertex(x + random(-8, 8), y + random(-8, 8));
          vertex(x + w + random(-8, 8), y + random(-8, 8));
          vertex(x + w + random(-8, 8), y + h + random(-8, 8));
          vertex(x + random(-8, 8), y + h + random(-8, 8));
          endShape(CLOSE);
        }
      }
    }

    // === HUSZÁR ===
    function generateHuszar() {
      cells = [];
      // Lower split chance for calmer, fewer cells
      let oldSplit = PARAMS.splitChance;
      PARAMS.splitChance = 0.45;
      subdivide(0, 0, PARAMS.canvasSize, PARAMS.canvasSize);
      PARAMS.splitChance = oldSplit;

      // Force gray to be part of the palette for this style
      let oldUseGray = PARAMS.useGray;
      PARAMS.useGray = true;
      ensureMinimumColor();
      PARAMS.useGray = oldUseGray;

      // Sort cells by area; largest first
      cells.sort((a, b) => b.w * b.h - a.w * a.h);

      // Ensure the largest cell has color (Huszár's signature dominant block)
      if (cells.length > 0 && !cells[0].color) {
        cells[0].color = pickColorForced();
      }

      background(PARAMS.bgColor);

      // Draw colored cells
      for (let c of cells) {
        if (c.color) {
          fill(c.color);
          noStroke();
          let inset = PARAMS.lineWeight / 2;
          rect(c.x + inset, c.y + inset, c.w - inset * 2, c.h - inset * 2);
        }
      }

      // Draw grid lines
      stroke(PARAMS.lineColor);
      strokeWeight(PARAMS.lineWeight);
      for (let c of cells) {
        noFill();
        rect(c.x, c.y, c.w, c.h);
      }
    }

    function setup() {
      let cnv = createCanvas(PARAMS.canvasSize, PARAMS.canvasSize);
      cnv.parent('canvas-container');
      pixelDensity(1);

      randomSeed(PARAMS.seed);
      noiseSeed(PARAMS.seed);
      generate();
      noLoop();
    }

    function draw() {
      // All drawing happens in generate()
    }

    function windowResized() {
      // Canvas is kept at PARAMS.canvasSize; CSS handles responsive display
    }
  </script>
</body>
